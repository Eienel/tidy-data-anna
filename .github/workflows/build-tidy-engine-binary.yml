name: Build tidy-engine binaries

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  EXECUTA_DIR: executas/tidy-engine-python

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      tool_id: ${{ steps.meta.outputs.tool_id }}
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: meta
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path
          data = json.loads(Path("${{ env.EXECUTA_DIR }}/executa.json").read_text())
          print(f"tool_id={data['tool_id']}")
          print(f"version={data.get('version') or '0.0.0'}")
          print(f"tag=tidy-engine-v{data.get('version')}")
          PY

  build:
    needs: meta
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - platform: darwin-arm64
            os: macos-14
          - platform: darwin-x86_64
            os: macos-15-intel
          - platform: linux-x86_64
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - name: Build binary
        working-directory: ${{ env.EXECUTA_DIR }}
        run: |
          chmod +x package_binary.sh
          ./package_binary.sh
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.meta.outputs.tool_id }}-${{ matrix.platform }}
          path: ${{ env.EXECUTA_DIR }}/dist-anna/${{ needs.meta.outputs.tool_id }}-${{ matrix.platform }}.tar.gz

  release:
    needs: [meta, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.tag }}
          files: release-assets/*
